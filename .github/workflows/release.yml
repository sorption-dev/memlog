name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-13            # Intel Mac
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: viewer/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install mcp dependencies
        working-directory: mcp
        run: bun install --frozen-lockfile

      - name: Install viewer dependencies
        working-directory: viewer
        run: bun install --frozen-lockfile

      - name: Build & release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # bun-compiled sidecar has a JS payload appended after the ELF —
          # `strip` would drop it and break the binary. Disable strip in
          # linuxdeploy's AppImage pipeline.
          NO_STRIP: 'true'
        with:
          projectPath: viewer
          tagName: ${{ github.ref_name }}
          releaseName: 'memlog ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install this version.

            **macOS**: `.dmg`
            **Windows**: `.msi` / `.exe`
            **Linux**: `.AppImage` / `.deb`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --verbose
